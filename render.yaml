services:
  - type: web
    name: d4
    runtime: python
    rootDir: .gemini/development
    buildCommand: pip install -r ../../requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: CELEBRACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ChatGPT_API_Key
        sync: false
      - key: Gemini_API_Key
        sync: false
