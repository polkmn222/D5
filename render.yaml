services:
  - type: web
    name: d4-surem-broker
    runtime: python
    rootDir: .gemini/development
    buildCommand: pip install -r ../../requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: SUREM_AUTH_URL
        sync: false
      - key: SUREM_USER_CODE
        sync: false
      - key: SUREM_SECRET_KEY
        sync: false
      - key: SUREM_BROKER_SECRET
        sync: false
