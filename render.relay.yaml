services:
  - type: web
    name: d5-relay
    runtime: python
    rootDir: development
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn web.message.backend.relay_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: MESSAGE_PROVIDER
        sync: false
      - key: RELAY_MESSAGE_TOKEN
        sync: false
      - key: RELAY_TARGET_PROVIDER
        sync: false
      - key: SUREM_USER_CODE
        sync: false
      - key: SUREM_SECRET_KEY
        sync: false
      - key: SUREM_REQ_PHONE
        sync: false
      - key: SUREM_FORCE_TO_NUMBER
        sync: false
      - key: SUREM_AUTH_URL
        sync: false
      - key: SUREM_SMS_URL
        sync: false
      - key: SUREM_MMS_URL
        sync: false
      - key: SUREM_IMAGE_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
