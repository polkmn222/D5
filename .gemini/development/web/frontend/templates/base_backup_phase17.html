<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI CRM{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="sf-header">
        <div style="font-size: 1.5rem;">⠿</div>
        <div style="font-weight: 700; color: var(--primary); font-size: 1.1rem;">Sales</div>
        <div style="flex-grow: 1;">
            <input type="text" placeholder="Search Setup..." class="btn" style="width: 300px; text-align: left; background: #f3f3f3;">
        </div>
    </header>
    <nav class="sf-tabs">
        <a href="/" class="sf-tab" id="nav-home">Home</a>
        <a href="/leads" class="sf-tab" id="nav-leads">Leads</a>
        <a href="/accounts" class="sf-tab" id="nav-accounts">Accounts</a>
        <a href="/contacts" class="sf-tab" id="nav-contacts">Contacts</a>
        <a href="/opportunities" class="sf-tab" id="nav-opportunities">Opportunities</a>
        <a href="/campaigns" class="sf-tab" id="nav-campaigns">Campaigns</a>
        <a href="/vehicle_specifications" class="sf-tab" id="nav-specs">Specifications</a>
        <a href="/products" class="sf-tab" id="nav-products">Products</a>
        <a href="/assets" class="sf-tab" id="nav-assets">Assets</a>
    </nav>
    <script>
        document.querySelectorAll('.sf-tab').forEach(tab => {
            if (window.location.pathname === tab.getAttribute('href')) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
    </script>
    <div id="sf-modal-overlay" class="sf-modal-overlay">
        <div class="sf-modal">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Phase 17: Toast Notifications -->
    <div id="sf-toast-container" class="sf-toast-container"></div>

    <!-- Phase 17: Delete Confirmation Modal -->
    <div id="sf-confirm-modal" class="sf-confirm-modal">
        <div class="sf-confirm-box">
            <div class="sf-confirm-header" id="sf-confirm-title">Delete Record</div>
            <div class="sf-confirm-body" id="sf-confirm-msg">Are you sure you want to delete this record?</div>
            <div class="sf-confirm-footer">
                <button class="btn btn-inline-cancel" onclick="closeConfirmModal()">Cancel</button>
                <button class="btn btn-primary" id="sf-confirm-delete-btn" style="background:#004787;">Delete</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(url) {
            fetch(url)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('modal-content').innerHTML = html;
                    document.getElementById('sf-modal-overlay').style.display = 'flex';
                });
        }

        function closeModal() {
            document.getElementById('sf-modal-overlay').style.display = 'none';
        }

        // --- TOAST SYSTEM ---
        function showToast(message, isError = false, undoUrl = null) {
            const container = document.getElementById('sf-toast-container');
            const toast = document.createElement('div');
            toast.className = `sf-toast ${isError ? 'error' : ''}`;
            
            let innerHTML = `<span>${message}</span>`;
            if (undoUrl) {
                innerHTML += `<span class="undo-link" onclick="undoAction('${undoUrl}', this.parentElement)">Undo</span>`;
            }
            innerHTML += `<span class="close-btn" onclick="this.parentElement.remove()">×</span>`;
            
            toast.innerHTML = innerHTML;
            container.appendChild(toast);
            
            setTimeout(() => { if(toast.parentElement) toast.remove(); }, 5000);
        }

        function undoAction(url, toastElement) {
            fetch(url, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    showToast("Action undone successfully.");
                    toastElement.remove();
                    window.location.reload();
                });
        }

        // --- DELETE CONFIRMATION ---
        function confirmDelete(type, id, name, pluralType) {
            const modal = document.getElementById('sf-confirm-modal');
            const title = document.getElementById('sf-confirm-title');
            const msg = document.getElementById('sf-confirm-msg');
            const btn = document.getElementById('sf-confirm-delete-btn');
            
            title.innerText = `Delete ${type}`;
            msg.innerText = `Are you sure you want to delete this ${type.toLowerCase()}?`;
            
            modal.style.display = 'flex';
            
            btn.onclick = () => {
                const url = `/${pluralType}/${id}/delete`;
                fetch(url, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        modal.style.display = 'none';
                        showToast(`${type} "${name}" was deleted.`, false, `/${pluralType}/${id}/restore`);
                        // Optionally refresh after a delay or remove from UI if in list
                        setTimeout(() => { window.location.href = `/${pluralType}`; }, 2000);
                    });
            };
        }

        function closeConfirmModal() {
            document.getElementById('sf-confirm-modal').style.display = 'none';
        }

        // --- INLINE EDITING ---
        function toggleInlineEdit(fieldId, objectType, recordId, fieldLabel) {
            const valueDisplay = document.getElementById(`value-${fieldId}`);
            const editCont = document.getElementById(`edit-${fieldId}`);
            
            if (editCont.style.display === 'none') {
                valueDisplay.style.display = 'none';
                editCont.style.display = 'block';
                editCont.querySelector('input').focus();
            } else {
                valueDisplay.style.display = 'block';
                editCont.style.display = 'none';
            }
        }

        function saveInlineEdit(fieldId, objectType, recordId, fieldLabel) {
            const input = document.getElementById(`input-${fieldId}`);
            const value = input.value;
            
            const formData = new FormData();
            formData.append('field', fieldLabel);
            formData.append('value', value);
            
            fetch(`/${objectType}/${recordId}/inline-save`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById(`text-${fieldId}`).innerText = value;
                toggleInlineEdit(fieldId);
                showToast(`${fieldLabel} updated successfully.`);
            })
            .catch(err => {
                showToast("Failed to update field.", true);
            });
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('sf-modal-overlay')) {
                closeModal();
            }
            if (event.target == document.getElementById('sf-confirm-modal')) {
                closeConfirmModal();
            }
        }
    </script>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
