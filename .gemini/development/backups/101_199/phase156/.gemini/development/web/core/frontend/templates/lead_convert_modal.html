<div class="sf-modal-header" style="background: white; border-bottom: 2px solid var(--border); padding: 1.25rem 1.5rem;">
    <h2 style="font-size: 1.25rem; font-weight: 400; text-align: center;">
        Convert Lead
    </h2>
    <span style="position: absolute; right: 1rem; top: 1rem; cursor: pointer; font-size: 1.5rem; color: #747474;" onclick="closeModal()">×</span>
</div>

<form id="convertForm" action="/leads/{{ lead.id }}/convert" method="POST">
    <div class="sf-modal-body" style="padding: 0; background: white; max-height: 75vh; overflow-y: auto;">
        
        <div style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem;">
            
            <!-- Account Section -->
            <div style="border: 1px solid var(--border); border-radius: 4px; padding: 1rem;">
                <h3 style="font-size: 0.875rem; font-weight: 700; margin-top: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-size: 1rem;">v</span> Account
                </h3>
                <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                        <input type="radio" name="account_action" value="create" checked onchange="toggleAccountSection()"> Create New Account
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1; color: var(--text-label);">
                        <input type="radio" name="account_action" value="existing" disabled> Choose Existing Account
                    </label>
                </div>
                
                <div id="account-create-section" style="margin-top: 1rem; padding-left: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="sf-field">
                        <label class="sf-field-label"><span style="color: #ea001e;">*</span> Account Name</label>
                        <input type="text" class="sf-input" name="account_name" value="{{ lead.first_name }} {{ lead.last_name }}" required>
                    </div>
                    <div class="sf-field">
                        <label class="sf-field-label">Record Type</label>
                        <select class="sf-select" name="account_record_type">
                            <option value="Individual">Individual</option>
                            <option value="Corporate">Corporate</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Contact Section -->
            <div style="border: 1px solid var(--border); border-radius: 4px; padding: 1rem;">
                <h3 style="font-size: 0.875rem; font-weight: 700; margin-top: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-size: 1rem;">v</span> Contact
                </h3>
                <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                        <input type="radio" name="contact_action" value="create" checked> Create New Contact
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1; color: var(--text-label);">
                        <input type="radio" name="contact_action" value="existing" disabled> Choose Existing Contact
                    </label>
                </div>
                
                <div id="contact-create-section" style="margin-top: 1rem; padding-left: 1.5rem;">
                    <div class="sf-field">
                        <input type="text" class="sf-input" name="contact_name" value="{{ lead.first_name }} {{ lead.last_name }}" readonly style="background: #f3f3f3; color: var(--text-label);">
                    </div>
                </div>
            </div>

            <!-- Opportunity Section -->
            <div style="border: 1px solid var(--border); border-radius: 4px; padding: 1rem;">
                <h3 style="font-size: 0.875rem; font-weight: 700; margin-top: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-size: 1rem;">v</span> Opportunity
                </h3>
                <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                        <input type="radio" name="opp_action" value="create" checked onchange="toggleOppSection()"> Create New Opportunity
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1; color: var(--text-label);">
                        <input type="radio" name="opp_action" value="existing" disabled> Choose Existing Opportunity
                    </label>
                </div>
                
                <div id="opp-create-section" style="margin-top: 1rem; padding-left: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="sf-field" id="opp-name-field">
                        <input type="text" class="sf-input" name="opportunity_name" value="{{ lead.first_name }} {{ lead.last_name }} - ">
                    </div>
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;">
                        <input type="checkbox" name="dont_create_opp" onchange="toggleOppName(this)"> Don't create an opportunity upon conversion
                    </label>
                </div>
            </div>

            <!-- Footer Details -->
            <div style="display: flex; gap: 2rem; background: #f9f9f9; padding: 1rem; border-radius: 4px;">
                <div class="sf-field" style="flex: 1;">
                    <label class="sf-field-label"><span style="color: #ea001e;">*</span> Record Owner</label>
                    <div class="sf-input" style="background: white; display: flex; align-items: center; gap: 0.5rem;">
                        <span style="background: var(--primary); color: white; border-radius: 2px; padding: 0 4px; font-size: 0.75rem;">👤</span>
                        System Admin
                        <span style="margin-left: auto; color: var(--text-label);">✕</span>
                    </div>
                </div>
                <div class="sf-field" style="flex: 1;">
                    <label class="sf-field-label"><span style="color: #ea001e;">*</span> Converted Status</label>
                    <select class="sf-select" name="converted_status">
                        <option value="Closed - Converted">Closed - Converted</option>
                    </select>
                </div>
            </div>

        </div>
    </div>
    
    <div class="sf-modal-footer" style="background: #f3f3f3; border-top: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: flex-end; gap: 0.5rem;">
        <button type="button" class="btn" style="background: white;" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Convert</button>
    </div>
</form>

<script>
    function toggleAccountSection() {
        // Feature to be expanded if searching existing is allowed
    }

    function toggleOppSection() {
        // Add functionality if "existing" opp search is allowed
    }

    function toggleOppName(checkbox) {
        const oppNameField = document.getElementById('opp-name-field');
        if (checkbox.checked) {
            oppNameField.style.display = 'none';
        } else {
            oppNameField.style.display = 'block';
        }
    }
</script>
