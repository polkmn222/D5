<div class="sf-modal-header" style="background: white; border-bottom: 2px solid var(--border); padding: 1.25rem 1.5rem;">
    <h2 style="font-size: 1.25rem; font-weight: 400; text-align: center;">
        {% if is_new %}New Lead{% else %}Edit {{ lead.first_name }} {{ lead.last_name }}{% endif %}
    </h2>
    <span style="position: absolute; right: 1rem; top: 1rem; cursor: pointer; font-size: 1.5rem; color: #747474;" onclick="closeModal()">×</span>
</div>

<form action="/leads/{% if not is_new %}{{ lead.id }}/update{% endif %}" method="POST">
    <div class="sf-modal-body" style="padding: 1.5rem; background: white; max-height: 70vh; overflow-y: auto;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label class="sf-field-label">First Name</label>
                <input type="text" name="first_name" class="sf-inline-input" value="{{ lead.first_name if lead else '' }}">
            </div>
            <div>
                <label class="sf-field-label">Last Name</label>
                <input type="text" name="last_name" class="sf-inline-input" value="{{ lead.last_name if lead else '' }}">
            </div>
            <div>
                <label class="sf-field-label">Email</label>
                <input type="email" name="email" class="sf-inline-input" value="{{ lead.email if lead else '' }}">
            </div>
            <div>
                <label class="sf-field-label">Phone</label>
                <input type="text" name="phone" class="sf-inline-input" value="{{ lead.phone if lead else '' }}">
            </div>
            <div>
                <label class="sf-field-label">Status</label>
                <select name="status" class="sf-inline-input">
                    <option value="New" {% if lead and lead.status == 'New' %}selected{% endif %}>New</option>
                    <option value="Follow Up" {% if lead and lead.status == 'Follow Up' %}selected{% endif %}>Follow Up</option>
                    <option value="Qualified" {% if lead and lead.status == 'Qualified' %}selected{% endif %}>Qualified</option>
                    <option value="Lost" {% if lead and lead.status == 'Lost' %}selected{% endif %}>Lost</option>
                </select>
            </div>
             <div>
                <label class="sf-field-label">Gender</label>
                <select name="gender" class="sf-inline-input">
                    <option value="">--None--</option>
                    <option value="Male" {% if lead and lead.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if lead and lead.gender == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>
            <div id="lookup-container-brand"></div>
            <div id="lookup-container-model"></div>
            <div id="lookup-container-product"></div>
            <div style="grid-column: span 2;">
                <label class="sf-field-label">Description</label>
                <textarea name="description" class="sf-inline-input" style="height: 80px;">{{ lead.description if lead else '' }}</textarea>
            </div>
        </div>
    </div>
    <div class="sf-modal-footer" style="background: #f3f3f3; padding: 0.75rem 1.5rem; justify-content: center; gap: 0.5rem;">
        <button type="button" class="btn btn-inline-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="padding: 0.25rem 1.5rem;">Save</button>
    </div>
</form>

<script>
    (function() {
        if (typeof initLookup === 'function') {
            initLookup('lookup-container-brand', 'Brand', 'brand', '{{ lead.brand if lead else "" }}', '{{ brand_name if brand_name else "" }}');
            initLookup('lookup-container-model', 'Model', 'model', '{{ lead.model if lead else "" }}', '{{ model_name if model_name else "" }}');
            initLookup('lookup-container-product', 'Product', 'product', '{{ lead.product if lead else "" }}', '{{ product_name if product_name else "" }}');
        }
    })();
</script>
