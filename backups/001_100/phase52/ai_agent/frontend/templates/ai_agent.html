<!-- AI Agent Assets -->
<link rel="stylesheet" href="/ai-agent/static/css/ai_agent.css">
<script src="/ai-agent/static/js/ai_agent.js" defer></script>

<!-- AI Agent Trigger Button -->
<div style="padding: 0 1rem 1rem;">
    <button class="btn" style="width: 100%; background: #0176d3; color: white; border-radius: 20px; padding: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-weight: 700; border: none; cursor: pointer;" onclick="toggleAiAgent()">
        <span style="background: white; color: #0176d3; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">🤖</span>
        Ask AI Agent
    </button>
</div>

<!-- AI Agent Chat Window -->
<div id="ai-agent-window">
    <!-- Window Header -->
    <div style="background: white; padding: 16px 24px; border-bottom: 1px solid #dddbda; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 32px; height: 32px; background: #fcb95b; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.9rem; box-shadow: 0 2px 4px rgba(252,185,91,0.2);">🤖</div>
            <span style="font-weight: 700; color: #080707; font-size: 1rem; letter-spacing: 0.02em;">AI AGENT</span>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button onclick="minimizeAiAgent()" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; color: #747474; padding: 4px; line-height: 1;">_</button>
            <button onclick="maximizeAiAgent()" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #747474; padding: 4px; line-height: 1;">⛶</button>
            <button onclick="resetAiAgent()" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; color: #747474; padding: 4px; line-height: 1;">×</button>
        </div>
    </div>

    <!-- Window Body with Sidebar -->
    <div class="ai-agent-main-container">
        <!-- Quick Access Guide Sidebar -->
        <div class="quick-guide-sidebar">
            <h3 style="font-size: 1.1rem!important; margin-bottom: 4px!important;">⚡ Quick Actions</h3>
            <p style="font-size: 0.8rem; color: #718096; margin-bottom: 24px; line-height: 1.4;">Select a common command</p>
            
            <button class="quick-btn" onclick="sendQuickMessage('AI Recommend')">✨ AI Recommend</button>
            <button class="quick-btn" onclick="sendQuickMessage('Change AI Recommend Table')">🎨 Change AI Recommend Table</button>
            <button class="quick-btn" onclick="sendQuickMessage('Send Message')">✉️ Send Message</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show my top deals')">🏆 Top Deals</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show all Leads')">👥 All Leads</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show all Contacts')">📇 All Contacts</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show all Opportunities')">💼 All Opportunities</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show recent Opportunities')">🕒 Recent Opps</button>
            <button class="quick-btn" onclick="sendQuickMessage('List my Leads')">📝 My Leads</button>
            <button class="quick-btn" onclick="sendQuickMessage('Show high-value deals')">💎 High Value</button>
        </div>

        <!-- Chat Area -->
        <div id="ai-agent-body">
            <div style="text-align: center; color: #706e6b; font-size: 0.75rem; margin-bottom: 20px; font-weight: 500;">CONVERSATION STARTED</div>
            
            <!-- Welcome Message -->
            <div class="msg-agent">
                <div class="msg-agent-header">
                    <div class="msg-agent-icon">🤖</div>
                    <span style="font-size: 0.8rem; font-weight: 700; color: #3e3e3c;">AI AGENT</span>
                </div>
                <div class="msg-agent-content">
                    <div class="msg-agent-text">Hello! I'm your AI Agent. I can help you manage <strong>Leads</strong>, <strong>Contacts</strong>, and <strong>Opportunities</strong> using natural language in English or Korean.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Window Footer -->
    <div id="ai-agent-footer">
        <div class="input-wrapper">
            <input type="text" id="ai-agent-input" placeholder="Type a message or command..." onkeypress="if(event.key === 'Enter') sendAiMessage()">
            <button class="send-btn" onclick="sendAiMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>
